name: Refresh commit feed

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # manual run button in GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push commits.json back to the repo

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch commits from all repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node .github/scripts/fetch-commits.js

      - name: Commit and push commits.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commits.json
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: refresh commit feed [skip ci]"
          git push
